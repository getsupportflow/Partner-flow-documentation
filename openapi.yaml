                  courierProvider:
                    type: string
                    nullable: true
                    description: Courier provider identifier, e.g. DPD, ROYAL_MAIL, PARCELFORCE, VASSA, CUSTOM, LOCAL_COLLECTION.
                  consignmentNumber:
                    type: string
                    nullable: true
                    description: Provider consignment or reference number, when available.
                  courierTrackingNumber:
                    type: string
                    nullable: true
                    description: Tracking number provided by the courier, when available.
                  courierLabelUrl:
