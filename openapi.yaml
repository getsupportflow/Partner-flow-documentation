                description: Response body for POST /integrations/stripe/connect/initiate
        "400":
          description: Failed to initiate Stripe Connect
        "500":
          description: Server error
  /integrations/stripe/connect/status:
    get:
      summary: Get Stripe Connect status
      description: Returns the current Stripe Connect connection status for the authenticated company, including whether charges and payouts are enabled.
      tags:
        - Integrations
      responses:
        "200":
          description: Stripe Connect status
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the integration operation succeeded
                  data:
                    type: object
                    properties:
                      isConnected:
                        type: boolean
                        description: True if the company has an active Stripe Connect account configured; false otherwise
                      accountEmail:
                        type: string
                        format: email
                        description: Email address of the connected Stripe account, if known
                      accountName:
                        type: string
                        description: Display name of the connected Stripe account, if known
                      chargesEnabled:
                        type: boolean
                        description: Whether Stripe has enabled charges on the connected account
                      payoutsEnabled:
                        type: boolean
                        description: Whether Stripe has enabled payouts on the connected account
                    required:
                      - isConnected
                    description: Stripe Connect connection status for the current company
                  error:
                    type: string
                    description: Error message when success is false
                  message:
                    type: string
                    description: Human-readable success or informational message
                required:
                  - success
                description: Response body for GET /integrations/stripe/connect/status
        "400":
          description: Failed to retrieve status
        "500":
          description: Server error
  /integrations/workflows:
    get:
      summary: List automation workflows
      description: Returns active n8n automation workflows that can be used for service automation, including required fields and credential requirements.
      tags:
        - Integrations
      responses:
        "200":
          description: List of automation workflows
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the integration operation succeeded
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          description: Workflow ID in the n8n instance
                        name:
                          type: string
                          description: Human-readable workflow name
                        active:
                          type: boolean
                          description: Whether the workflow is currently active
                        requiredFields:
                          type: array
                          items:
                            type: object
                            properties:
                              name:
                                type: string
                                description: Machine-readable field name expected by the workflow
                              type:
                                type: string
                                description: Primitive type of the field (e.g. string, number, boolean, json)
                              description:
                                type: string
                                description: Human-readable description of what the field represents
                              required:
                                type: boolean
                                description: True when this field is required for workflow execution
                            required:
                              - name
                              - type
                            description: Input field required by an n8n workflow, extracted from workflow metadata
                          description: Optional list of required input fields extracted from the workflow metadata
                        requiredCredential:
                          type: array
                          items:
                            type: object
                            properties:
                              CredentialProvider:
                                type: string
                                description: Name of the credential provider required by the workflow (e.g. gmail, stripe)
                            required:
                              - CredentialProvider
                            description: Credential provider required by an n8n workflow
                          description: Optional list of credential providers required by the workflow
                      required:
                        - id
                        - name
                        - active
                      description: Automation workflow exposed from n8n and consumable by WarrantyFlow
                    description: List of active n8n workflows that can be used for automation
                  error:
                    type: string
                    description: Error message when success is false
                  message:
                    type: string
                    description: Human-readable success or informational message
                required:
                  - success
                description: Response body for GET /integrations/workflows
        "401":
          description: Unauthorized
        "500":
          description: Server error
  /webhooks/stripe:
    post:
      summary: Stripe webhook
      description: Handle Stripe webhook events (raw body; stripe-signature header required). Used for platform payments and customer invoice payments.
      tags:
        - Webhooks
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties:
                nullable: true
      responses:
        "200":
          description: Webhook processed
          content:
            application/json:
              schema:
                type: object
                properties:
                  received:
                    type: boolean
                  error:
                    type: string
                description: Stripe webhook handler response
        "400":
          description: Invalid signature or payload
  /health:
    get:
      summary: Health check
      description: API health status (database, environment checks). Returns 200 healthy, 503 unhealthy.
      tags:
        - Health
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: *a66
                  timestamp:
                    type: string
                  uptime:
                    type: number
                  environment:
                    type: string
                  version:
                    type: string
                  error:
                    type: string
                  checks:
                    type: object
                    properties:
                      database:
                        type: object
                        properties:
                          status:
                            type: string
                          responseTime:
                            type: number
                        required:
                          - status
                      environment:
                        type: object
                        properties:
                          status:
                            type: string
                          details:
                            type: object
                            additionalProperties:
                              type: boolean
                        required:
                          - status
                required:
                  - status
                  - timestamp
        "503":
          description: Unhealthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    enum: *a66
                  timestamp:
                    type: string
                  uptime:
                    type: number
                  environment:
                    type: string
                  version:
                    type: string
                  error:
                    type: string
                  checks:
                    type: object
                    properties:
                      database:
                        type: object
                        properties:
                          status:
                            type: string
                          responseTime:
                            type: number
                        required:
                          - status
                      environment:
                        type: object
                        properties:
                          status:
                            type: string
                          details:
                            type: object
                            additionalProperties:
                              type: boolean
                        required:
                          - status
                required:
                  - status
                  - timestamp
