  /customers/import:
    post:
      summary: Import customers from CSV
      description: Bulk import customers from a CSV file. Requires ADMIN role. Accepts multipart/form-data with a CSV file and a JSON header mapping.
      tags:
        - Customers
      requestBody:
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                file:
                  nullable: true
                  description: CSV file to import (max 10 MB)
                headerMapping:
                  type: string
                  description: JSON string mapping CSV column headers to customer fields
              required:
                - headerMapping
      responses:
        "200":
          description: Import result with counts
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the import succeeded
                  data:
                    type: object
                    properties:
                      imported:
                        type: number
                        description: Number of customers successfully imported
                      skipped:
                        type: number
                        description: Number of rows skipped
                      errors:
                        type: array
                        items:
                          type: object
                          properties:
                            row:
                              type: number
                              description: CSV row number
                            message:
                              type: string
                              description: Error description
                          required:
                            - row
                            - message
                        description: Per-row import errors
                    required:
                      - imported
                    description: Import result details
                  error:
                    type: string
                    description: Top-level error message
                required:
                  - success
        "400":
          description: Invalid file, missing mapping, or import errors
        "401":
          description: Unauthorized
        "403":
          description: Only administrators can import customers
