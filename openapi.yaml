      type: object
      properties:
        code:
          type: string
          minLength: 1
          description: Authorization code returned by Stripe Connect (present on success)
        state:
          type: string
          description: Opaque state string passed through the OAuth flow to prevent CSRF
        error:
          type: string
          description: Error code provided by Stripe when the authorization failed
        error_description:
          type: string
          description: Human-readable description of the error from Stripe
      description: Query parameters for GET/POST /integrations/stripe/connect/callback
    StripeConnectInitiateResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the integration operation succeeded
        data:
          type: object
          properties:
