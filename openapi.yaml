  /billing/invoices/{id}/create-payment-intent:
    post:
      summary: Create payment intent for invoice
      description: Create a Stripe payment intent for the invoice using the company's connected Stripe account (Stripe Connect). Returns clientSecret and publishableKey for Stripe Elements. Always returns HTTP 200; when success is false (e.g. STRIPE_NOT_CONNECTED), the client may fall back to bank transfer.
      tags:
        - Billing
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      responses:
        "200":
          description: Payment intent created, or logical error (success false) for client-side branching.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the operation succeeded.
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                    description: Response payload (e.g. clientSecret, paymentId, instructions).
                  message:
                    type: string
                    nullable: true
                    description: Human-readable message.
                  error:
                    type: string
                    nullable: true
                    description: Error code or message when success is false.
                required:
                  - success
                description: Envelope for create-payment-intent, confirm-payment, and bank-transfer-payment responses.
  /billing/invoices/{id}/confirm-payment:
    post:
      summary: Confirm invoice payment
      description: Confirm an invoice payment after the client has completed Stripe payment (e.g. via Stripe Elements). Requires the payment intent ID returned from create-payment-intent.
      tags:
        - Billing
      parameters:
        - schema:
            type: string
            format: uuid
          required: true
          name: id
          in: path
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                paymentIntentId:
                  type: string
                  minLength: 1
                  description: Stripe payment intent ID returned from create-payment-intent and confirmed on the client.
              required:
                - paymentIntentId
              description: Payload used to confirm an invoice payment after client-side Stripe confirmation.
      responses:
        "200":
          description: Payment confirmed successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                    description: Whether the operation succeeded.
                  data:
                    type: object
                    nullable: true
                    additionalProperties:
                      nullable: true
                    description: Response payload (e.g. clientSecret, paymentId, instructions).
                  message:
                    type: string
                    nullable: true
                    description: Human-readable message.
                  error:
                    type: string
                    nullable: true
                    description: Error code or message when success is false.
                required:
                  - success
                description: Envelope for create-payment-intent, confirm-payment, and bank-transfer-payment responses.
        "400":
          description: Missing paymentIntentId or confirmation failed.
