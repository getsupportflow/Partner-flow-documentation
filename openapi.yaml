        - recipientId
        - issuerCompanyId
        - subTotal
        - totalAmount
        - vatAmount
        - vatRate
    BillingListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              referenceNumber:
                type: string
              status:
                type: string
              recipientType:
                type: string
              recipientId:
                type: string
                format: uuid
              issuerCompanyId:
