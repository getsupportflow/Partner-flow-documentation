      description: Return invoice performance metrics (counts, totals and collection rate) for the last N days (30 by default).
      tags:
        - Billing
      parameters:
        - schema:
            type: integer
            minimum: 1
            maximum: 365
            description: Optional number of days to look back from today; defaults to 30 when omitted.
          required: false
          description: Optional number of days to look back from today; defaults to 30 when omitted.
          name: days
          in: query
      responses:
        "200":
          description: Invoice performance metrics for the requested time window.
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalInvoices:
                    type: number
                    description: Total number of invoices issued in the period.
                  paidInvoices:
                    type: number
                    description: Number of invoices that have been fully paid in the period.
                  totalBilled:
                    type: number
                    description: Total billed amount (sum of invoice totals) in the period, regardless of payment status.
                  totalPaid:
                    type: number
                    description: Total amount received from paid invoices in the period.
                  paymentRate:
                    type: number
                    description: Percentage of invoices in the period that have been paid (paidInvoices / totalInvoices * 100).
                  overdueInvoices:
                    type: number
                    description: Number of invoices that are currently overdue at the time of calculation.
                  collectionRate:
                    type: number
                    description: Percentage of billed amount that has been collected (totalPaid / totalBilled * 100, safe‑guarded against division by zero).
                required:
                  - totalInvoices
                  - paidInvoices
                  - totalBilled
                  - totalPaid
                  - paymentRate
                  - overdueInvoices
                  - collectionRate
                description: High‑level invoice performance metrics for the company over a configurable period.
