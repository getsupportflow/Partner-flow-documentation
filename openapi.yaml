      description: Runs a system automation by ID (e.g. create estimate, invoice, collection/delivery shipment, service transfer, task list). Requires automationId and context in the request body.
      tags:
        - System Automation
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                automationId:
                  type: string
                  minLength: 1
                  description: System automation ID (e.g. system-auto-create-estimate)
                context:
                  type: object
                  additionalProperties:
                    nullable: true
                  description: Context payload passed to the automation (structure depends on automation type)
              required:
                - automationId
                - context
      responses:
        "200":
          description: Automation executed successfully or with validation error details
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    nullable: true
                    description: Result payload when success is true; shape depends on automation type
                  message:
                    type: string
                  error:
                    type: string
                    description: Error message when success is false
                  metadata:
                    nullable: true
                    description: Optional metadata on error responses
                required:
                  - success
        "400":
          description: Bad request (missing automationId/context or unsupported automation)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    nullable: true
                    description: Result payload when success is true; shape depends on automation type
                  message:
                    type: string
                  error:
                    type: string
                    description: Error message when success is false
                  metadata:
                    nullable: true
                    description: Optional metadata on error responses
                required:
                  - success
        "401":
          description: Unauthorized
        "500":
          description: System automation failed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    nullable: true
                    description: Result payload when success is true; shape depends on automation type
                  message:
                    type: string
                  error:
                    type: string
                    description: Error message when success is false
                  metadata:
                    nullable: true
                    description: Optional metadata on error responses
                required:
                  - success
