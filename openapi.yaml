  /analytics/dashboard:
    get:
      summary: Get analytics dashboard
      description: Aggregated analytics (company, customers, services, financial, partners) for the authenticated company
      tags:
        - Analytics
      responses:
        "200":
          description: Dashboard analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  company:
                    type: object
                    properties:
                      totalCustomers:
                        type: number
                        description: Total number of customers for the company
                      totalServices:
                        type: number
                        description: Total number of services for the company
                      totalContracts:
                        type: number
                        description: Total number of contracts linked to company services
                      totalInvoices:
                        type: number
                        description: Total number of invoices issued by the company
                      totalRevenue:
                        type: number
                        description: Sum of PAID invoice amounts for the company
                      activeServices:
                        type: number
                        description: Number of ACTIVE services
                      pendingContracts:
                        type: number
                        description: Number of contracts pending signature
                      overdueInvoices:
                        type: number
                        description: Number of cancelled/overdue invoices
                      completionRate:
                        type: number
                        description: Service completion rate percentage (ACTIVE vs total services) for the company
                      contractSuccessRate:
                        type: number
                        description: Contract success rate percentage (non-pending vs total contracts) for the company
                      paymentRate:
                        type: number
                        description: Invoice payment rate percentage (paid vs total invoices, including overdue)
                    required:
                      - totalCustomers
                      - totalServices
                      - totalContracts
                      - totalInvoices
                      - totalRevenue
                      - activeServices
                      - pendingContracts
                      - overdueInvoices
                      - completionRate
                      - contractSuccessRate
                      - paymentRate
                    description: Company-level analytics summary
                  customers:
                    type: object
                    properties:
                      totalCustomers:
                        type: number
                        description: Total number of customers for the company
                      newCustomers:
                        type: number
                        description: Number of new customers created in the recent period (e.g. last 30 days)
                      activeCustomers:
                        type: number
                        description: Number of active customers (e.g. with delivered shipments)
                      totalRevenue:
                        type: number
                        description: Total PAID invoice revenue attributable to customers
                      averageContractsPerCustomer:
                        type: number
                        description: Average number of contracts per customer based on grouped contract counts
                      averageServicesPerCustomer:
                        type: number
                        description: Average number of services per customer based on grouped shipment counts
                      customerRetentionRate:
                        type: number
                        description: Customer retention rate percentage (active vs total customers)
                      newCustomerRate:
                        type: number
                        description: New customer acquisition rate percentage over the recent period
                    required:
                      - totalCustomers
                      - newCustomers
                      - activeCustomers
                      - totalRevenue
                      - averageContractsPerCustomer
                      - averageServicesPerCustomer
                      - customerRetentionRate
                      - newCustomerRate
                    description: Customer analytics summary
                  services:
                    type: object
                    properties:
                      totalServices:
                        type: number
                        description: Total number of services for the company
                      activeServices:
                        type: number
                        description: Number of ACTIVE services
                      totalServiceRecords:
                        type: number
                        description: Total number of service records (currently using shipments as a proxy)
                      totalRevenue:
                        type: number
                        description: Total PAID invoice revenue across all services for the company
                      serviceUtilizationRate:
                        type: number
                        description: Service utilization rate percentage (active vs total services)
                      averageRecordsPerService:
                        type: number
                        description: Average number of service records per service
                      popularServices:
                        type: array
                        items:
                          type: object
                          properties:
                            serviceId:
                              type: string
                              nullable: true
                              description: Service identifier for this popular service (nullable for legacy records)
                            _count:
                              type: object
                              properties:
                                id:
                                  type: number
                                  description: Number of records associated with this service
                              required:
                                - id
                              description: Aggregated count of related records for the service
                          required:
                            - _count
                          description: Popular service entry based on grouped shipment counts
                        description: Top services ordered by number of associated shipments/records
                    required:
                      - totalServices
                      - activeServices
                      - totalServiceRecords
                      - totalRevenue
                      - serviceUtilizationRate
                      - averageRecordsPerService
                      - popularServices
                    description: Service analytics summary
                  financial:
                    type: object
                    properties:
                      totalRevenue:
                        type: number
                        description: Total PAID invoice revenue for the company
                      totalExpenses:
                        type: number
                        description: Total expenses (placeholder until expense model is implemented)
                      outstandingAmount:
                        type: number
                        description: Total amount of invoices in SENT status (outstanding receivables)
                      profit:
                        type: number
                        description: Profit = totalRevenue - totalExpenses
                      profitMargin:
                        type: number
                        description: Profit margin percentage, derived from totalRevenue and profit
                      paidInvoices:
                        type: number
                        description: Count of PAID invoices
                      overdueInvoices:
                        type: number
                        description: Count of CANCELLED/overdue invoices
                      paymentRate:
                        type: number
                        description: Payment rate percentage (paid vs paid + overdue invoices)
                      monthlyRevenue:
                        type: array
                        items:
                          type: object
                          properties:
                            createdAt:
                              type: string
                              format: date-time
                              description: Date bucket for aggregated revenue (based on invoice creation time)
                            _sum:
                              type: object
                              properties:
                                totalAmount:
                                  type: number
                                  nullable: true
                                  description: Sum of PAID invoice amounts for this bucket; null when no invoices
                              required:
                                - totalAmount
                              description: Aggregated invoice totalAmount sum for this bucket
                          required:
                            - createdAt
                            - _sum
                          description: Aggregated monthly (or periodic) revenue data point
                        description: Time-series of aggregated invoice revenue over the last 12 months
                    required:
                      - totalRevenue
                      - totalExpenses
                      - outstandingAmount
                      - profit
                      - profitMargin
                      - paidInvoices
                      - overdueInvoices
                      - paymentRate
                      - monthlyRevenue
                    description: Financial analytics summary
                  partners:
                    type: object
                    properties:
                      totalPartners:
                        type: number
                        description: Total number of partner connections for the company
                      activePartners:
                        type: number
                        description: Number of CONNECTED partners
                      totalConnections:
                        type: number
                        description: Total number of service connections across all partners
                      totalPartnerServices:
                        type: number
                        description: Number of services that are connected to at least one partner
                      partnerRevenue:
                        type: number
                        description: Total PAID invoice revenue attributable to partner-connected services
                      partnerEngagementRate:
                        type: number
                        description: Partner engagement rate percentage (active vs total partners)
                      averageConnectionsPerPartner:
                        type: number
                        description: Average number of service connections per partner
                      averageServicesPerPartner:
                        type: number
                        description: Average number of services linked to each partner
                    required:
                      - totalPartners
                      - activePartners
                      - totalConnections
                      - totalPartnerServices
                      - partnerRevenue
                      - partnerEngagementRate
                      - averageConnectionsPerPartner
                      - averageServicesPerPartner
                    description: Partner analytics summary
                  timestamp:
                    type: string
                    format: date-time
                    description: ISO8601 timestamp when this dashboard snapshot was generated
                required:
                  - company
                  - customers
                  - services
                  - financial
                  - partners
                  - timestamp
                description: Composite analytics dashboard payload (company, customers, services, financials, partners)
