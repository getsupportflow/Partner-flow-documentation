  /shipping/sync-shipments-for-transaction:
    post:
      summary: Sync shipments for transaction
      description: Replace existing shipments for a transaction with new collection/delivery shipments created from selected logistics methods.
      tags:
        - Shipping
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                transactionId:
                  type: string
                  format: uuid
                  description: Billing transaction ID whose shipments should be replaced.
                serviceRecordId:
                  type: string
                  format: uuid
                  description: Service record ID associated with the transaction.
                serviceId:
                  type: string
                  format: uuid
                  description: Service ID associated with the service record.
                customerId:
                  type: string
                  format: uuid
                  description: Customer ID that will receive the synced shipments.
                collectionSelections:
                  type: array
                  items:
                    type: object
                    properties:
                      methodId:
                        type: string
                        format: uuid
                        description: Logistics method ID to use when creating shipments.
                      quantity:
                        type: integer
                        minimum: 0
                        description: Number of shipments to create for this method.
                      cost:
                        type: number
                        description: Optional per-shipment cost override for this method.
                      courierProvider:
                        type: string
                        nullable: true
                        description: Optional courier provider override for this method (e.g. DPD).
                    required:
                      - methodId
                      - quantity
                    description: Single logistics method selection used when syncing shipments for a transaction.
                  default: *a32
                  description: Selections for collection shipments to create.
                deliverySelections:
                  type: array
                  items:
                    type: object
                    properties:
                      methodId:
                        type: string
                        format: uuid
                        description: Logistics method ID to use when creating shipments.
                      quantity:
                        type: integer
                        minimum: 0
                        description: Number of shipments to create for this method.
                      cost:
                        type: number
                        description: Optional per-shipment cost override for this method.
                      courierProvider:
                        type: string
                        nullable: true
                        description: Optional courier provider override for this method (e.g. DPD).
                    required:
                      - methodId
                      - quantity
                    description: Single logistics method selection used when syncing shipments for a transaction.
                  default: *a33
                  description: Selections for delivery shipments to create.
              required:
                - transactionId
                - serviceRecordId
                - serviceId
                - customerId
              description: Payload for syncing shipments associated with a transaction from selected logistics methods. Existing shipments for the transaction are deleted and recreated from these selections.
      responses:
        "200":
          description: Shipments synced successfully.
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  nullable: true
                description: Generic acknowledgement object for a successful sync operation. Currently empty, but reserved for future summary fields.
        "400":
          description: Validation error, missing company context, or permission mismatch between caller and transaction issuer company.
  /shipping/create:
    post:
      summary: Create shipment (legacy/company)
      description: Legacy shipment creation endpoint used by existing UIs. Accepts detailed logistics payload including line items, dates, and optional manual recipient address.
      tags:
        - Shipping
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                type:
                  type: string
                  enum: *a34
                  description: Shipment type, either 'DELIVERY' (to customer) or 'COLLECTION' (from customer).
                senderAddressId:
                  type: string
                  format: uuid
                  description: Required sender address ID for this shipment
                recipientAddressId:
                  type: string
                  nullable: true
                  format: uuid
                  description: Optional recipient address ID. The v3 route also accepts an empty string, which is treated as unset.
                recipientCustomerId:
                  type: string
                  nullable: true
                  format: uuid
                  description: Optional recipient customer ID. The v3 route also accepts an empty string, which is treated as unset.
                serviceId:
                  type: string
                  nullable: true
                  format: uuid
                  description: Optional service ID associated with the shipment. Empty string is treated as unset.
                serviceRecordId:
                  type: string
                  nullable: true
                  format: uuid
                  description: Optional service record ID that this shipment is associated with. Empty string is treated as unset.
                courierProvider:
                  type: string
                  enum: *a35
                  description: Courier provider to use for this shipment, if already known.
                expectedDeliveryDate:
                  anyOf:
                    - type: string
                      nullable: true
                    - type: string
                    - nullable: true
                  description: Expected delivery date as a Date or ISO string.
                collectionDate:
                  anyOf:
                    - type: string
                      nullable: true
                    - type: string
                    - nullable: true
                  description: Collection date as a Date or ISO string.
                requiresApproval:
                  type: boolean
                  description: Whether the shipment requires explicit approval before dispatch. Defaults to true when omitted.
                trackingNotes:
                  type: string
                  description: Optional internal tracking notes or delivery instructions.
                lineItems:
                  type: array
                  items:
                    type: object
                    properties:
                      name:
                        type: string
                        description: Display name of the item being shipped
                      description:
                        type: string
                        description: Optional description of the item
                      quantity:
                        type: integer
                        minimum: 0
                        exclusiveMinimum: true
                        description: Number of units for this line item (must be positive).
                      weight:
                        type: number
                        minimum: 0
                        description: Optional weight for this line item (same unit as logistics configuration).
                      dimensions:
                        type: object
                        properties:
                          length:
                            type: number
                            minimum: 0
                            description: Length of the package
                          width:
                            type: number
                            minimum: 0
                            description: Width of the package
                          height:
                            type: number
                            minimum: 0
                            description: Height of the package
                        required:
                          - length
                          - width
                          - height
                        description: Optional physical dimensions of the package.
                    required:
                      - name
                      - quantity
                  description: Optional list of line items or packages included in the shipment.
                manualRecipientAddress:
                  type: object
                  properties:
                    street:
                      type: string
                      minLength: 1
                      description: Primary street line
                    street2:
                      type: string
                      description: Optional second street line
                    city:
                      type: string
                      minLength: 1
                      description: City or locality
                    postcode:
                      type: string
                      minLength: 1
                      description: Postal or ZIP code
                    country:
                      type: string
                      minLength: 1
                      description: Country name or ISO code
                  required:
                    - street
                    - city
                    - postcode
                    - country
                  description: Optional inline recipient address when not using a stored address record. Ignored when recipientAddressId is provided.
              required:
                - type
                - senderAddressId
              description: Request body for POST /business/shipping/create. Mirrors the legacy shipment creation payload used by the shared frontends.
      responses:
        "201":
          description: Shipment created successfully.
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: string
                    format: uuid
                    description: Shipment ID
                  shipmentNumber:
                    type: string
                    description: Human-readable shipment number (e.g. DEL-..., COL-...).
                  type:
                    type: string
                    description: Shipment type such as 'DELIVERY' or 'COLLECTION'.
                  status:
                    type: string
                    description: Current shipment status. Common values include DRAFT, PENDING_APPROVAL, APPROVED, IN_TRANSIT, DELIVERED, FAILED, and RETURNED.
                  issuerCompanyId:
                    type: string
                    format: uuid
                    description: Company that issued the shipment.
                  senderAddressId:
                    type: string
                    nullable: true
                    format: uuid
                    description: Address ID used as the sender origin.
                  recipientAddressId:
                    type: string
                    nullable: true
                    format: uuid
                    description: Address ID used as the shipment destination.
                  recipientCustomerId:
                    type: string
