  /analytics/date-range:
    get:
      summary: Get analytics by date range
      description: Returns aggregated analytics (new customers, services, contracts, revenue) for a specific date range with configurable grouping
      tags:
        - Analytics
      parameters:
        - schema:
            type: string
            format: date-time
            description: Required ISO8601 start date (inclusive) for the reporting window
          required: true
          description: Required ISO8601 start date (inclusive) for the reporting window
          name: startDate
          in: query
        - schema:
            type: string
            format: date-time
            description: Required ISO8601 end date (inclusive) for the reporting window
          required: true
          description: Required ISO8601 end date (inclusive) for the reporting window
          name: endDate
          in: query
        - schema:
            type: string
            enum: *a20
            default: month
            description: Aggregation grain for charts and time-series (defaults to month)
          required: false
          description: Aggregation grain for charts and time-series (defaults to month)
          name: groupBy
          in: query
      responses:
        "200":
          description: Date-range analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  newCustomers:
                    type: number
                    description: Number of new customers in the date range
                  newServices:
                    type: number
                    description: Number of new services created in the date range
                  newContracts:
                    type: number
                    description: Number of new contracts created in the date range
                  revenue:
                    type: number
                    description: Total PAID invoice revenue in the date range
                  invoices:
                    type: number
                    description: Number of invoices created in the date range
                  averageRevenuePerInvoice:
                    type: number
                    description: Average revenue per invoice in the date range
                  dateRange:
                    type: object
                    properties:
                      startDate:
                        type: string
                        format: date-time
                        description: Required ISO8601 start date (inclusive) for the reporting window
                      endDate:
                        type: string
                        format: date-time
                        description: Required ISO8601 end date (inclusive) for the reporting window
                      groupBy:
                        type: string
                        enum: *a20
                        default: month
                        description: Aggregation grain for charts and time-series (defaults to month)
                    required:
                      - startDate
                      - endDate
                    description: Validated date range and grouping used for this analytics snapshot
                  timestamp:
                    type: string
                    format: date-time
                    description: ISO8601 timestamp when this date-range analytics snapshot was generated
                required:
                  - newCustomers
                  - newServices
                  - newContracts
                  - revenue
                  - invoices
                  - averageRevenuePerInvoice
                  - dateRange
                  - timestamp
                description: Aggregated analytics for a given date range (customers, services, contracts, revenue)
        "400":
          description: Missing or invalid startDate/endDate
  /analytics/financial:
    get:
      summary: Get financial analytics
      description: Financial analytics aggregates including revenue, profit, outstanding amounts, payment rates, and monthly revenue time-series. Optional companyId query override.
      tags:
        - Analytics
      parameters:
        - schema:
            type: string
            format: uuid
            description: Optional company UUID; falls back to the authenticated user company when omitted
          required: false
          description: Optional company UUID; falls back to the authenticated user company when omitted
          name: companyId
          in: query
      responses:
        "200":
          description: Financial analytics
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalRevenue:
                    type: number
                    description: Total PAID invoice revenue for the company
                  totalExpenses:
                    type: number
                    description: Total expenses (placeholder until expense model is implemented)
                  outstandingAmount:
                    type: number
                    description: Total amount of invoices in SENT status (outstanding receivables)
                  profit:
                    type: number
                    description: Profit = totalRevenue - totalExpenses
                  profitMargin:
                    type: number
                    description: Profit margin percentage, derived from totalRevenue and profit
                  paidInvoices:
                    type: number
                    description: Count of PAID invoices
                  overdueInvoices:
                    type: number
                    description: Count of CANCELLED/overdue invoices
                  paymentRate:
                    type: number
                    description: Payment rate percentage (paid vs paid + overdue invoices)
                  monthlyRevenue:
                    type: array
                    items:
                      type: object
                      properties:
                        createdAt:
                          type: string
                          format: date-time
                          description: Date bucket for aggregated revenue (based on invoice creation time)
                        _sum:
                          type: object
                          properties:
                            totalAmount:
                              type: number
                              nullable: true
                              description: Sum of PAID invoice amounts for this bucket; null when no invoices
                          required:
                            - totalAmount
                          description: Aggregated invoice totalAmount sum for this bucket
                      required:
                        - createdAt
                        - _sum
                      description: Aggregated monthly (or periodic) revenue data point
                    description: Time-series of aggregated invoice revenue over the last 12 months
                required:
                  - totalRevenue
                  - totalExpenses
                  - outstandingAmount
                  - profit
                  - profitMargin
                  - paidInvoices
                  - overdueInvoices
                  - paymentRate
                  - monthlyRevenue
                description: Financial analytics aggregates (revenue, profit, outstanding amounts, and monthly revenue)
