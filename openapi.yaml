paths:
  /business/customers:
    get:
      summary: List customers
      description: Paginated list of customers for the authenticated company
      tags:
        - Customers
      parameters:
        - schema:
            type: number
            minimum: 1
            default: 1
          required: false
          name: page
          in: query
        - schema:
            type: number
            minimum: 1
            maximum: 100
            default: 10
          required: false
          name: limit
          in: query
        - schema:
            type: string
            default: createdAt
          required: false
          name: sortBy
          in: query
        - schema:
            type: string
            enum: *a9
            default: desc
          required: false
          name: sortOrder
          in: query
        - schema:
            type: string
          required: false
          name: search
          in: query
      responses:
        "200":
          description: Paginated customer list
          content:
            application/json:
              schema:
                type: object
                properties:
                  customers:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                          format: uuid
                        companyId:
                          type: string
                          format: uuid
                        userId:
                          type: string
                          nullable: true
                          format: uuid
                        billingAddressId:
                          type: string
                          nullable: true
                          format: uuid
                        shippingAddressId:
                          type: string
                          nullable: true
                          format: uuid
                        createdAt:
                          type: string
                          nullable: true
                        updatedAt:
                          type: string
                          nullable: true
                        user:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: string
                              format: uuid
                            firstName:
                              type: string
                              nullable: true
                            lastName:
                              type: string
                              nullable: true
                            email:
                              type: string
                              nullable: true
                              format: email
                            phone:
                              type: string
                              nullable: true
                            role:
                              type: string
                            recordImage:
                              type: string
                              nullable: true
                            status:
                              type: string
                            createdAt:
                              type: string
                              nullable: true
                            updatedAt:
                              type: string
                              nullable: true
                          required:
                            - id
                            - firstName
                            - lastName
                            - email
                            - phone
                            - role
                            - status
                        billingAddress:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: string
                              format: uuid
                            street:
                              type: string
                            street2:
                              type: string
                              nullable: true
                            city:
                              type: string
                            postcode:
                              type: string
                            state:
                              type: string
                              nullable: true
                            country:
                              type: string
                            type:
                              type: string
                              enum: *a1
                          required:
                            - street
                            - city
                            - postcode
                            - country
                        shippingAddress:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: string
                              format: uuid
                            street:
                              type: string
                            street2:
                              type: string
                              nullable: true
                            city:
                              type: string
                            postcode:
                              type: string
                            state:
                              type: string
                              nullable: true
                            country:
                              type: string
                            type:
                              type: string
                              enum: *a1
                          required:
                            - street
                            - city
                            - postcode
                            - country
                        company:
                          type: object
                          nullable: true
                          properties:
                            id:
                              type: string
                              format: uuid
                            apiName:
                              type: string
                          required:
                            - id
                      required:
                        - id
                        - companyId
                  pagination:
                    type: object
                    properties:
                      page:
                        type: number
                      limit:
                        type: number
                      total:
                        type: number
                      totalPages:
                        type: number
                    required:
                      - page
                      - limit
                      - total
                      - totalPages
                required:
                  - customers
                  - pagination
    post:
      summary: Create customer
      description: Create a new customer for the authenticated company
      tags:
        - Customers
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 50
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 50
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  minLength: 7
                  maxLength: 20
                shippingAddress:
                  type: object
                  properties:
                    street:
                      type: string
                      minLength: 1
                    street2:
                      type: string
                    city:
                      type: string
                      minLength: 1
                    postcode:
                      type: string
                      minLength: 1
                    state:
                      type: string
                    country:
                      type: string
                      minLength: 1
                  required:
                    - street
                    - city
                    - postcode
                    - country
                billingAddress:
                  type: object
                  properties:
                    street:
                      type: string
                      minLength: 1
                    street2:
                      type: string
                    city:
                      type: string
                      minLength: 1
                    postcode:
                      type: string
                      minLength: 1
                    state:
                      type: string
                    country:
                      type: string
                      minLength: 1
                  required:
                    - street
                    - city
                    - postcode
                    - country
                notes:
                  type: string
