            limit:
              type: number
            total:
              type: number
            totalPages:
              type: number
          required:
            - page
            - limit
            - total
            - totalPages
      required:
        - data
        - pagination
    CreateServiceInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        companyId:
          type: string
          format: uuid
        status:
          type: string
          enum: &a15
            - ACTIVE
            - INACTIVE
          default: ACTIVE
        flow:
          nullable: true
        properties:
          type: object
          additionalProperties:
            nullable: true
        fields:
          type: array
          items:
            nullable: true
        apiName:
          type: string
        tableName:
          type: string
      required:
        - name
    UpdateServiceInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 500
        status:
          type: string
          enum: &a16
            - ACTIVE
            - INACTIVE
        flow:
          nullable: true
        properties:
          type: object
          additionalProperties:
            nullable: true
        fields:
          type: array
          items:
            nullable: true
    ServiceDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
