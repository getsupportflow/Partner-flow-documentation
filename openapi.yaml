      type: object
      properties:
        id:
          type: string
          format: uuid
        referenceNumber:
          type: string
        status:
          type: string
        recipientType:
          type: string
        recipientId:
          type: string
          format: uuid
        issuerCompanyId:
          type: string
          format: uuid
        subTotal:
          type: number
        totalAmount:
          type: number
        vatAmount:
