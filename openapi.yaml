openapi: 3.0.0
info:
  title: WarrantyFlow V3 API
  version: 3.0.0
  description: Versioned API for warranty and service management. Use API key or session auth.
servers:
  - url: https://api.warrantyflow.com/api/v3
    description: Production
  - url: http://localhost:3000/api/v3
    description: Development
tags:
  - name: Customers
    description: Customer management
  - name: Suppliers
    description: Supplier management
  - name: Billing
    description: Estimates, invoices, and transactions
  - name: Service
    description: Service definitions
  - name: Service Records
    description: Service record instances, transitions, related records, media, invoice helpers, and customer/partner views
  - name: Shipping
    description: Shipments and logistics
  - name: Workspace
    description: Task lists and tasks
  - name: Health
    description: Health check
  - name: Users
    description: User management
  - name: Roles
    description: Roles and permissions
  - name: API Keys
    description: API key management
  - name: Dashboard
    description: Dashboards
  - name: Solutions
    description: Solutions
  - name: Subscriptions
    description: Subscriptions
  - name: Inventory
    description: Products and inventory
  - name: Communications
    description: Communications (email, SMS)
  - name: Email Templates
    description: Email templates
  - name: Partner
    description: Partner invitations and relationships
  - name: Locations
    description: Company locations (warehouses, offices)
  - name: Audit
    description: Audit logs and activity
  - name: Company
    description: Company info and partners
  - name: Contracts
    description: Contract list, generate, sign, upload, download
  - name: Onboarding
    description: Onboarding status and progress
  - name: Subscriptions
    description: Subscription plan and status
  - name: Forms
    description: Form list and create
  - name: Documentation
    description: Service documentation nodes
  - name: Email Sender Identities
    description: Email sender identities
  - name: Profile
    description: Profile and offering/fulfillment profile IDs
  - name: Service Items
    description: Service items
  - name: Service Item Custom Fields
    description: Service item custom fields
  - name: System Automation
    description: Execute system automations (estimate, invoice, shipment, service transfer, task list)
  - name: System Email Templates
    description: SaaS-level system email templates (ADMIN only)
  - name: AI
    description: AI analysis and contract text generation
  - name: Auth
    description: "Authentication: login, logout, forgot-password, reset-password"
  - name: Admin
    description: Admin performance and system status
  - name: Analytics
    description: Analytics dashboard, company, customer, service, financial, partner, logistics, academy, statistics, and date-range reporting
  - name: Customer Portal
    description: Customer portal profile and service record data
  - name: Integrations
    description: Integration connections (e.g. Gmail, Stripe)
  - name: Webhooks
    description: Webhook handlers (e.g. Stripe)
components:
  schemas:
    Id:
      type: string
      format: uuid
    PaginationQuery:
      type: object
      properties:
        page:
          type: number
          minimum: 1
          default: 1
        limit:
          type: number
          minimum: 1
          maximum: 100
          default: 10
        sortBy:
          type: string
        sortOrder:
          type: string
          enum: &a8
            - asc
            - desc
          default: desc
    PaginationDto:
      type: object
      properties:
        page:
          type: number
        limit:
          type: number
        total:
          type: number
        totalPages:
          type: number
      required:
        - page
        - limit
        - total
        - totalPages
    CreateCustomerInput:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 50
        lastName:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 7
          maxLength: 20
        shippingAddress:
          type: object
          properties:
            street:
              type: string
              minLength: 1
            street2:
              type: string
            city:
              type: string
              minLength: 1
            postcode:
              type: string
              minLength: 1
            state:
              type: string
            country:
              type: string
              minLength: 1
          required:
            - street
            - city
            - postcode
            - country
        billingAddress:
          type: object
          properties:
            street:
              type: string
              minLength: 1
            street2:
              type: string
            city:
              type: string
              minLength: 1
            postcode:
              type: string
              minLength: 1
            state:
              type: string
            country:
              type: string
              minLength: 1
          required:
            - street
            - city
            - postcode
            - country
        notes:
          type: string
          maxLength: 1000
      required:
        - firstName
        - lastName
    UpdateCustomerInput:
      anyOf:
        - type: object
          properties:
            user:
              type: object
              properties:
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 50
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 50
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  minLength: 7
                  maxLength: 20
              additionalProperties: false
            shippingAddress:
              type: object
              properties:
                street:
                  type: string
                  minLength: 1
                street2:
                  type: string
                  nullable: true
                city:
                  type: string
                  minLength: 1
                state:
                  type: string
                  nullable: true
                postcode:
                  type: string
                  minLength: 1
                country:
                  type: string
                  minLength: 1
              additionalProperties: false
            billingAddress:
              type: object
              properties:
                street:
                  type: string
                  minLength: 1
                street2:
                  type: string
                  nullable: true
                city:
                  type: string
                  minLength: 1
                state:
                  type: string
                  nullable: true
                postcode:
                  type: string
                  minLength: 1
                country:
                  type: string
                  minLength: 1
              additionalProperties: false
            isActive:
              type: boolean
            notes:
              type: string
              maxLength: 1000
          additionalProperties: false
        - type: object
          properties:
            firstName:
              type: string
              minLength: 1
              maxLength: 50
            lastName:
              type: string
              minLength: 1
              maxLength: 50
            email:
              type: string
              format: email
            phone:
              type: string
              minLength: 7
              maxLength: 20
            isActive:
              type: boolean
            notes:
              type: string
              maxLength: 1000
          additionalProperties: false
    ListCustomersQuery:
      type: object
      properties:
        page:
          type: number
          minimum: 1
          default: 1
        limit:
          type: number
          minimum: 1
          maximum: 100
          default: 10
        sortBy:
          type: string
          default: createdAt
        sortOrder:
          type: string
          enum: &a22
            - asc
            - desc
          default: desc
        search:
          type: string
    CustomerDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        userId:
          type: string
          nullable: true
          format: uuid
        billingAddressId:
          type: string
          nullable: true
          format: uuid
        shippingAddressId:
          type: string
          nullable: true
          format: uuid
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
        user:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            firstName:
              type: string
              nullable: true
            lastName:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
              format: email
            phone:
              type: string
              nullable: true
            role:
              type: string
            recordImage:
              type: string
              nullable: true
            status:
              type: string
            createdAt:
              type: string
              nullable: true
            updatedAt:
              type: string
              nullable: true
          required:
            - id
            - firstName
            - lastName
            - email
            - phone
            - role
            - status
        billingAddress:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            street:
              type: string
            street2:
              type: string
              nullable: true
            city:
              type: string
            postcode:
              type: string
            state:
              type: string
              nullable: true
            country:
              type: string
            type:
              type: string
              enum: &a1
                - BILLING
                - SHIPPING
          required:
            - street
            - city
            - postcode
            - country
        shippingAddress:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            street:
              type: string
            street2:
              type: string
              nullable: true
            city:
              type: string
            postcode:
              type: string
            state:
              type: string
              nullable: true
            country:
              type: string
            type:
              type: string
              enum: *a1
          required:
            - street
            - city
            - postcode
            - country
        company:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            apiName:
              type: string
          required:
            - id
      required:
        - id
        - companyId
    CustomerListResponse:
      type: object
      properties:
        customers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              companyId:
                type: string
                format: uuid
              userId:
                type: string
                nullable: true
                format: uuid
              billingAddressId:
                type: string
                nullable: true
                format: uuid
              shippingAddressId:
                type: string
                nullable: true
                format: uuid
              createdAt:
                type: string
                nullable: true
              updatedAt:
                type: string
                nullable: true
              user:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                    format: uuid
                  firstName:
                    type: string
                    nullable: true
                  lastName:
                    type: string
                    nullable: true
                  email:
                    type: string
                    nullable: true
                    format: email
                  phone:
                    type: string
                    nullable: true
                  role:
                    type: string
                  recordImage:
                    type: string
                    nullable: true
                  status:
                    type: string
                  createdAt:
                    type: string
                    nullable: true
                  updatedAt:
                    type: string
                    nullable: true
                required:
                  - id
                  - firstName
                  - lastName
                  - email
                  - phone
                  - role
                  - status
              billingAddress:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                    format: uuid
                  street:
                    type: string
                  street2:
                    type: string
                    nullable: true
                  city:
                    type: string
                  postcode:
                    type: string
                  state:
                    type: string
                    nullable: true
                  country:
                    type: string
                  type:
                    type: string
                    enum: *a1
                required:
                  - street
                  - city
                  - postcode
                  - country
              shippingAddress:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                    format: uuid
                  street:
                    type: string
                  street2:
                    type: string
                    nullable: true
                  city:
                    type: string
                  postcode:
                    type: string
                  state:
                    type: string
                    nullable: true
                  country:
                    type: string
                  type:
                    type: string
                    enum: *a1
                required:
                  - street
                  - city
                  - postcode
                  - country
              company:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                    format: uuid
                  apiName:
                    type: string
                required:
                  - id
            required:
              - id
              - companyId
        pagination:
          type: object
          properties:
            page:
              type: number
            limit:
              type: number
            total:
              type: number
            totalPages:
              type: number
          required:
            - page
            - limit
            - total
            - totalPages
      required:
        - customers
        - pagination
    CustomerImportResponse:
      type: object
      properties:
        success:
          type: boolean
          description: Whether the import succeeded
        data:
          type: object
          properties:
            imported:
              type: number
              description: Number of customers successfully imported
            skipped:
              type: number
              description: Number of rows skipped
            errors:
              type: array
              items:
                type: object
                properties:
                  row:
                    type: number
                    description: CSV row number
                  message:
                    type: string
                    description: Error description
                required:
                  - row
                  - message
              description: Per-row import errors
          required:
            - imported
          description: Import result details
        error:
          type: string
          description: Top-level error message
      required:
        - success
    CreateSupplierInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 7
          maxLength: 20
        category:
          type: string
          enum: &a23
            - ELECTRONICS
            - MECHANICAL
            - SOFTWARE
            - SERVICES
            - OTHER
          default: OTHER
        address:
          type: object
          properties:
            street:
              type: string
              minLength: 1
            city:
              type: string
              minLength: 1
            state:
              type: string
            zipCode:
              type: string
              minLength: 1
            country:
              type: string
              minLength: 1
          required:
            - street
            - city
            - zipCode
            - country
        notes:
          type: string
          maxLength: 1000
      required:
        - name
        - email
    UpdateSupplierInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 7
          maxLength: 20
        category:
          type: string
          enum: &a2
            - ELECTRONICS
            - MECHANICAL
            - SOFTWARE
            - SERVICES
            - OTHER
        status:
          type: string
          enum: &a3
            - ACTIVE
            - INACTIVE
            - SUSPENDED
        notes:
          type: string
          maxLength: 1000
    SupplierDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        category:
          type: string
        status:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
      required:
        - id
        - companyId
        - name
    SupplierListResponse:
      type: object
      properties:
        suppliers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              companyId:
                type: string
                format: uuid
              name:
                type: string
              email:
                type: string
                nullable: true
              phone:
                type: string
                nullable: true
              category:
                type: string
              status:
                type: string
              notes:
                type: string
                nullable: true
              createdAt:
                type: string
                nullable: true
              updatedAt:
                type: string
                nullable: true
            required:
              - id
              - companyId
              - name
        pagination:
          type: object
          properties:
            page:
              type: number
            limit:
              type: number
            total:
              type: number
            totalPages:
              type: number
          required:
            - page
            - limit
            - total
            - totalPages
      required:
        - suppliers
        - pagination
    SupplierActivitySummaryQuery:
      type: object
      properties:
        days:
          type: integer
          minimum: 1
          maximum: 365
          default: 30
          description: Number of past days to include in the activity window.
      description: Query parameters for the supplier activity summary endpoint.
    SupplierActivitySummaryDto:
      type: object
      properties:
        newSuppliers:
          type: number
          description: Count of suppliers created within the requested window.
        suppliersWithNewProducts:
          type: number
          description: Suppliers that received new product additions.
        suppliersWithNewOrders:
          type: number
          description: Suppliers that received new orders.
        growthRate:
          type: number
          description: Percentage growth rate of suppliers compared to the previous period.
      required:
        - newSuppliers
        - suppliersWithNewProducts
        - suppliersWithNewOrders
        - growthRate
      description: Aggregated supplier activity metrics for a given time window.
    SupplierBulkUpdateInput:
      type: object
      properties:
        supplierIds:
          type: array
          items:
            type: string
            format: uuid
          minItems: 1
          description: List of supplier IDs to update.
        data:
          type: object
          properties:
            name:
              type: string
              minLength: 1
              maxLength: 100
            email:
              type: string
              format: email
            phone:
              type: string
              minLength: 7
              maxLength: 20
            category:
              type: string
              enum: *a2
            status:
              type: string
              enum: *a3
            notes:
              type: string
              maxLength: 1000
          description: Fields to apply to all selected suppliers.
      required:
        - supplierIds
        - data
      description: Payload for bulk-updating multiple suppliers at once.
    SupplierBulkUpdateResponse:
      type: object
      properties:
        updatedCount:
          type: number
          description: Number of supplier records that were updated.
      required:
        - updatedCount
      description: Result of a bulk supplier update operation.
    SupplierExportInput:
      type: object
      properties:
        startDate:
          type: string
          description: ISO 8601 start date filter for the export window.
        endDate:
          type: string
          description: ISO 8601 end date filter for the export window.
      description: Optional date range filters when exporting supplier data.
    SupplierExportResponse:
      type: array
      items:
        type: object
        properties:
          id:
            type: string
            format: uuid
            description: Supplier unique identifier.
          name:
            type: string
            description: Supplier display name.
          email:
            type: string
            nullable: true
            description: Supplier contact email.
          phone:
            type: string
            nullable: true
            description: Supplier contact phone number.
          productCount:
            type: number
            description: Total number of products associated with this supplier.
          orderCount:
            type: number
            description: Total number of orders placed with this supplier.
          totalOrderValue:
            type: number
            description: Cumulative monetary value of all orders.
          createdAt:
            type: string
            nullable: true
            description: Date when the supplier record was created.
          updatedAt:
            type: string
            nullable: true
            description: Date when the supplier record was last modified.
        required:
          - id
          - name
          - email
          - phone
          - productCount
          - orderCount
          - totalOrderValue
          - createdAt
          - updatedAt
        description: Single row of exported supplier data with aggregated order and product counts.
      description: Array of supplier export rows.
    SupplierProductDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
          description: Product unique identifier.
        name:
          type: string
          description: Product name.
        sku:
          type: string
          description: Stock-keeping unit code.
        price:
          type: number
          description: Unit price of the product.
        quantity:
          type: number
          description: Current stock quantity.
        supplierId:
          type: string
          description: Associated supplier ID.
        companyId:
          type: string
          description: Owning company ID.
        createdAt:
          type: string
          nullable: true
          description: Record creation timestamp.
        updatedAt:
          type: string
          nullable: true
          description: Record last-updated timestamp.
      required:
        - id
      description: Product belonging to a specific supplier.
    SupplierProductsResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: Product unique identifier.
              name:
                type: string
                description: Product name.
              sku:
                type: string
                description: Stock-keeping unit code.
              price:
                type: number
                description: Unit price of the product.
              quantity:
                type: number
                description: Current stock quantity.
              supplierId:
                type: string
                description: Associated supplier ID.
              companyId:
                type: string
                description: Owning company ID.
              createdAt:
                type: string
                nullable: true
                description: Record creation timestamp.
              updatedAt:
                type: string
                nullable: true
                description: Record last-updated timestamp.
            required:
              - id
            description: Product belonging to a specific supplier.
          description: List of products for the supplier.
        pagination:
          type: object
          properties:
            page:
              type: number
              description: Current page number.
            limit:
              type: number
              description: Items per page.
            total:
              type: number
              description: Total matching records.
            totalPages:
              type: number
              description: Total number of pages.
          required:
            - page
            - limit
            - total
            - totalPages
          description: Pagination metadata.
      required:
        - data
        - pagination
      description: Paginated list of products belonging to a specific supplier.
    SupplierPerformanceMetricsDto:
      type: object
      properties:
        suppliers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: Supplier unique identifier.
              name:
                type: string
                description: Supplier display name.
              totalOrders:
                type: number
                description: Total number of fulfilled orders.
              totalProducts:
                type: number
                description: Total number of products from this supplier.
              averageOrderValue:
                type: number
                description: Average monetary value per order.
              performanceScore:
                type: number
                description: Calculated performance score (0-100).
            required:
              - id
              - name
              - totalOrders
              - totalProducts
              - averageOrderValue
              - performanceScore
            description: Performance metrics for a single supplier.
          description: Performance metrics for all suppliers.
        topPerformers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
                description: Supplier unique identifier.
              name:
                type: string
                description: Supplier display name.
              totalOrders:
                type: number
                description: Total number of fulfilled orders.
              totalProducts:
                type: number
                description: Total number of products from this supplier.
              averageOrderValue:
                type: number
                description: Average monetary value per order.
              performanceScore:
                type: number
                description: Calculated performance score (0-100).
            required:
              - id
              - name
              - totalOrders
              - totalProducts
              - averageOrderValue
              - performanceScore
            description: Performance metrics for a single supplier.
          description: Top-performing suppliers by score.
        averagePerformanceScore:
          type: number
          description: Average performance score across all suppliers.
      required:
        - suppliers
        - topPerformers
        - averagePerformanceScore
      description: Aggregated supplier performance metrics for a company.
    LineItemInput:
      type: object
      properties:
        type:
          type: string
          enum: &a4
            - SERVICE_ITEM
            - PRODUCT
            - SOLUTION
            - SHIPPING
            - COLLECTION
          description: Classification of the line item (service work, product, solution bundle or logistics).
        description:
          type: string
          minLength: 1
          description: Human‑readable description that appears on the invoice/transaction line.
        note:
          type: string
          description: Optional internal or customer‑visible note for this line item.
        quantity:
          type: number
          minimum: 0
          exclusiveMinimum: true
          description: Number of units being billed for this item.
        unitPrice:
          type: number
          minimum: 0
          description: Price per unit before discounts and tax.
        totalPrice:
          type: number
          minimum: 0
          description: Line total after discounts but before any overall invoice adjustments.
        itemOrder:
          type: number
          description: Optional explicit ordering index; defaults to array index when omitted.
        discount:
          type: number
          minimum: 0
          description: Optional percentage discount to apply to this line (0–100).
        productId:
          type: string
          format: uuid
          description: Optional product identifier when this line represents a catalog product.
        solutionId:
          type: string
          format: uuid
          description: Optional solution identifier when this line represents a solution.
        vatRate:
          type: number
          minimum: 0
          description: Optional VAT rate in percent; used to derive vatAmount when not explicitly provided.
        vatAmount:
          type: number
          minimum: 0
          description: Optional explicit VAT amount for this line; overrides calculation from vatRate when set.
        payableByCustomer:
          type: boolean
          description: Whether this line is payable by the end‑customer (vs internal or partner charges).
