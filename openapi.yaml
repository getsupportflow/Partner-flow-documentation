openapi: 3.0.0
info:
  title: WarrantyFlow V3 API
  version: 3.0.0
  description: Versioned API for warranty and service management. Use API key or session auth.
servers:
  - url: https://api.warrantyflow.com/api/v3
    description: Production
  - url: http://localhost:3000/api/v3
    description: Development
tags:
  - name: Customers
    description: Customer management
  - name: Suppliers
    description: Supplier management
  - name: Billing
    description: Estimates, invoices, and transactions
  - name: Service
    description: Service definitions
  - name: Service Records
    description: Service record instances
  - name: Shipping
    description: Shipments and logistics
  - name: Workspace
    description: Task lists and tasks
  - name: Health
    description: Health check
  - name: Users
    description: User management
  - name: Roles
    description: Roles and permissions
  - name: API Keys
    description: API key management
  - name: Dashboard
    description: Dashboards
  - name: Solutions
    description: Solutions
  - name: Subscriptions
    description: Subscriptions
  - name: Inventory
    description: Products and inventory
  - name: Communications
    description: Communications (email, SMS)
  - name: Email Templates
    description: Email templates
  - name: Partner
    description: Partner invitations and relationships
  - name: Locations
    description: Company locations (warehouses, offices)
  - name: Audit
    description: Audit logs and activity
  - name: Company
    description: Company info and partners
  - name: Contracts
    description: Contract list, generate, sign, upload, download
  - name: Onboarding
    description: Onboarding status and progress
  - name: Subscriptions
    description: Subscription plan and status
  - name: Forms
    description: Form list and create
  - name: Documentation
    description: Service documentation nodes
  - name: Email Sender Identities
    description: Email sender identities
  - name: Profile
    description: Profile and offering/fulfillment profile IDs
  - name: Service Items
    description: Service items
  - name: Service Item Custom Fields
    description: Service item custom fields
  - name: System Automation
    description: Execute system automations (estimate, invoice, shipment, service transfer, task list)
  - name: System Email Templates
    description: SaaS-level system email templates (ADMIN only)
  - name: AI
    description: AI analysis and contract text generation
  - name: Auth
    description: "Authentication: login, logout, forgot-password, reset-password"
  - name: Admin
    description: Admin performance and system status
  - name: Analytics
    description: Analytics dashboard, company, customer
  - name: Customer Portal
    description: Customer portal profile and service record data
  - name: Integrations
    description: Integration connections (e.g. Gmail, Stripe)
  - name: Webhooks
    description: Webhook handlers (e.g. Stripe)
components:
  schemas:
    Id:
      type: string
      format: uuid
    PaginationQuery:
      type: object
      properties:
        page:
          type: number
          minimum: 1
          default: 1
        limit:
          type: number
          minimum: 1
          maximum: 100
          default: 10
        sortBy:
          type: string
        sortOrder:
          type: string
          enum: &a13
            - asc
            - desc
          default: desc
    PaginationDto:
      type: object
      properties:
        page:
          type: number
        limit:
          type: number
        total:
          type: number
        totalPages:
          type: number
      required:
        - page
        - limit
        - total
        - totalPages
    CreateCustomerInput:
      type: object
      properties:
        firstName:
          type: string
          minLength: 1
          maxLength: 50
        lastName:
          type: string
          minLength: 1
          maxLength: 50
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 7
          maxLength: 20
        shippingAddress:
          type: object
          properties:
            street:
              type: string
              minLength: 1
            street2:
              type: string
            city:
              type: string
              minLength: 1
            postcode:
              type: string
              minLength: 1
            state:
              type: string
            country:
              type: string
              minLength: 1
          required:
            - street
            - city
            - postcode
            - country
        billingAddress:
          type: object
          properties:
            street:
              type: string
              minLength: 1
            street2:
              type: string
            city:
              type: string
              minLength: 1
            postcode:
              type: string
              minLength: 1
            state:
              type: string
            country:
              type: string
              minLength: 1
          required:
            - street
            - city
            - postcode
            - country
        notes:
          type: string
          maxLength: 1000
      required:
        - firstName
        - lastName
    UpdateCustomerInput:
      anyOf:
        - type: object
          properties:
            user:
              type: object
              properties:
                firstName:
                  type: string
                  minLength: 1
                  maxLength: 50
                lastName:
                  type: string
                  minLength: 1
                  maxLength: 50
                email:
                  type: string
                  format: email
                phone:
                  type: string
                  minLength: 7
                  maxLength: 20
              additionalProperties: false
            shippingAddress:
              type: object
              properties:
                street:
                  type: string
                  minLength: 1
                street2:
                  type: string
                  nullable: true
                city:
                  type: string
                  minLength: 1
                state:
                  type: string
                  nullable: true
                postcode:
                  type: string
                  minLength: 1
                country:
                  type: string
                  minLength: 1
              additionalProperties: false
            billingAddress:
              type: object
              properties:
                street:
                  type: string
                  minLength: 1
                street2:
                  type: string
                  nullable: true
                city:
                  type: string
                  minLength: 1
                state:
                  type: string
                  nullable: true
                postcode:
                  type: string
                  minLength: 1
                country:
                  type: string
                  minLength: 1
              additionalProperties: false
            isActive:
              type: boolean
            notes:
              type: string
              maxLength: 1000
          additionalProperties: false
        - type: object
          properties:
            firstName:
              type: string
              minLength: 1
              maxLength: 50
            lastName:
              type: string
              minLength: 1
              maxLength: 50
            email:
              type: string
              format: email
            phone:
              type: string
              minLength: 7
              maxLength: 20
            isActive:
              type: boolean
            notes:
              type: string
              maxLength: 1000
          additionalProperties: false
    ListCustomersQuery:
      type: object
      properties:
        page:
          type: number
          minimum: 1
          default: 1
        limit:
          type: number
          minimum: 1
          maximum: 100
          default: 10
        sortBy:
          type: string
          default: createdAt
        sortOrder:
          type: string
          enum: &a9
            - asc
            - desc
          default: desc
        search:
          type: string
    CustomerDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        userId:
          type: string
          nullable: true
          format: uuid
        billingAddressId:
          type: string
          nullable: true
          format: uuid
        shippingAddressId:
          type: string
          nullable: true
          format: uuid
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
        user:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            firstName:
              type: string
              nullable: true
            lastName:
              type: string
              nullable: true
            email:
              type: string
              nullable: true
              format: email
            phone:
              type: string
              nullable: true
            role:
              type: string
            recordImage:
              type: string
              nullable: true
            status:
              type: string
            createdAt:
              type: string
              nullable: true
            updatedAt:
              type: string
              nullable: true
          required:
            - id
            - firstName
            - lastName
            - email
            - phone
            - role
            - status
        billingAddress:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            street:
              type: string
            street2:
              type: string
              nullable: true
            city:
              type: string
            postcode:
              type: string
            state:
              type: string
              nullable: true
            country:
              type: string
            type:
              type: string
              enum: &a1
                - BILLING
                - SHIPPING
          required:
            - street
            - city
            - postcode
            - country
        shippingAddress:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            street:
              type: string
            street2:
              type: string
              nullable: true
            city:
              type: string
            postcode:
              type: string
            state:
              type: string
              nullable: true
            country:
              type: string
            type:
              type: string
              enum: *a1
          required:
            - street
            - city
            - postcode
            - country
        company:
          type: object
          nullable: true
          properties:
            id:
              type: string
              format: uuid
            apiName:
              type: string
          required:
            - id
      required:
        - id
        - companyId
    CustomerListResponse:
      type: object
      properties:
        customers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              companyId:
                type: string
                format: uuid
              userId:
                type: string
                nullable: true
                format: uuid
              billingAddressId:
                type: string
                nullable: true
                format: uuid
              shippingAddressId:
                type: string
                nullable: true
                format: uuid
              createdAt:
                type: string
                nullable: true
              updatedAt:
                type: string
                nullable: true
              user:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                    format: uuid
                  firstName:
                    type: string
                    nullable: true
                  lastName:
                    type: string
                    nullable: true
                  email:
                    type: string
                    nullable: true
                    format: email
                  phone:
                    type: string
                    nullable: true
                  role:
                    type: string
                  recordImage:
                    type: string
                    nullable: true
                  status:
                    type: string
                  createdAt:
                    type: string
                    nullable: true
                  updatedAt:
                    type: string
                    nullable: true
                required:
                  - id
                  - firstName
                  - lastName
                  - email
                  - phone
                  - role
                  - status
              billingAddress:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                    format: uuid
                  street:
                    type: string
                  street2:
                    type: string
                    nullable: true
                  city:
                    type: string
                  postcode:
                    type: string
                  state:
                    type: string
                    nullable: true
                  country:
                    type: string
                  type:
                    type: string
                    enum: *a1
                required:
                  - street
                  - city
                  - postcode
                  - country
              shippingAddress:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                    format: uuid
                  street:
                    type: string
                  street2:
                    type: string
                    nullable: true
                  city:
                    type: string
                  postcode:
                    type: string
                  state:
                    type: string
                    nullable: true
                  country:
                    type: string
                  type:
                    type: string
                    enum: *a1
                required:
                  - street
                  - city
                  - postcode
                  - country
              company:
                type: object
                nullable: true
                properties:
                  id:
                    type: string
                    format: uuid
                  apiName:
                    type: string
                required:
                  - id
            required:
              - id
              - companyId
        pagination:
          type: object
          properties:
            page:
              type: number
            limit:
              type: number
            total:
              type: number
            totalPages:
              type: number
          required:
            - page
            - limit
            - total
            - totalPages
      required:
        - customers
        - pagination
    CreateSupplierInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 7
          maxLength: 20
        category:
          type: string
          enum: &a10
            - ELECTRONICS
            - MECHANICAL
            - SOFTWARE
            - SERVICES
            - OTHER
          default: OTHER
        address:
          type: object
          properties:
            street:
              type: string
              minLength: 1
            city:
              type: string
              minLength: 1
            state:
              type: string
            zipCode:
              type: string
              minLength: 1
            country:
              type: string
              minLength: 1
          required:
            - street
            - city
            - zipCode
            - country
        notes:
          type: string
          maxLength: 1000
      required:
        - name
        - email
    UpdateSupplierInput:
      type: object
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        email:
          type: string
          format: email
        phone:
          type: string
          minLength: 7
          maxLength: 20
        category:
          type: string
          enum: &a11
            - ELECTRONICS
            - MECHANICAL
            - SOFTWARE
            - SERVICES
            - OTHER
        status:
          type: string
          enum: &a12
            - ACTIVE
            - INACTIVE
            - SUSPENDED
        notes:
          type: string
          maxLength: 1000
    SupplierDto:
      type: object
      properties:
        id:
          type: string
          format: uuid
        companyId:
          type: string
          format: uuid
        name:
          type: string
        email:
          type: string
          nullable: true
        phone:
          type: string
          nullable: true
        category:
          type: string
        status:
          type: string
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
          nullable: true
        updatedAt:
          type: string
          nullable: true
      required:
        - id
        - companyId
        - name
    SupplierListResponse:
      type: object
      properties:
        suppliers:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
                format: uuid
              companyId:
                type: string
                format: uuid
              name:
                type: string
              email:
                type: string
                nullable: true
              phone:
                type: string
                nullable: true
              category:
                type: string
              status:
                type: string
              notes:
                type: string
                nullable: true
              createdAt:
                type: string
                nullable: true
              updatedAt:
                type: string
                nullable: true
            required:
              - id
              - companyId
              - name
        pagination:
          type: object
          properties:
            page:
              type: number
            limit:
              type: number
            total:
              type: number
            totalPages:
              type: number
          required:
            - page
            - limit
            - total
            - totalPages
      required:
        - suppliers
        - pagination
    LineItemInput:
      type: object
      properties:
        type:
          type: string
          enum: &a2
            - SERVICE_ITEM
            - PRODUCT
            - SOLUTION
            - SHIPPING
            - COLLECTION
        description:
          type: string
          minLength: 1
        note:
          type: string
        quantity:
          type: number
          minimum: 0
          exclusiveMinimum: true
        unitPrice:
          type: number
          minimum: 0
        totalPrice:
          type: number
          minimum: 0
        itemOrder:
          type: number
        discount:
          type: number
          minimum: 0
        productId:
          type: string
          format: uuid
        solutionId:
          type: string
          format: uuid
        vatRate:
          type: number
          minimum: 0
        vatAmount:
          type: number
          minimum: 0
        payableByCustomer:
          type: boolean
        isMandatory:
          type: boolean
      required:
        - type
        - description
        - quantity
        - unitPrice
        - totalPrice
    CreateEstimateInput:
      type: object
      properties:
        referenceNumber:
          type: string
        recipientType:
          type: string
          enum: &a3
            - CUSTOMER
            - COMPANY
        recipientId:
          type: string
          format: uuid
        serviceId:
          type: string
          format: uuid
        serviceRecordId:
          type: string
          format: uuid
        dueDate:
          anyOf:
            - type: string
              format: date-time
            - type: string
              nullable: true
            - nullable: true
        paymentTerms:
          type: string
        subTotal:
          type: number
          minimum: 0
        totalAmount:
          type: number
          minimum: 0
        vatAmount:
          type: number
          minimum: 0
        vatRate:
          type: number
          minimum: 0
        shippingCost:
          type: number
          minimum: 0
        notes:
          type: string
        termsAndConditions:
          type: string
        currencyCode:
          type: string
        lineItems:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: *a2
              description:
                type: string
                minLength: 1
              note:
                type: string
              quantity:
                type: number
                minimum: 0
                exclusiveMinimum: true
              unitPrice:
                type: number
                minimum: 0
              totalPrice:
                type: number
                minimum: 0
              itemOrder:
                type: number
              discount:
                type: number
                minimum: 0
              productId:
                type: string
                format: uuid
              solutionId:
                type: string
                format: uuid
              vatRate:
                type: number
                minimum: 0
              vatAmount:
                type: number
                minimum: 0
              payableByCustomer:
                type: boolean
              isMandatory:
                type: boolean
            required:
              - type
              - description
              - quantity
              - unitPrice
              - totalPrice
          minItems: 1
      required:
        - recipientType
        - recipientId
        - dueDate
        - subTotal
        - totalAmount
        - lineItems
    CreateInvoiceInput:
      type: object
      properties:
        referenceNumber:
          type: string
        recipientType:
          type: string
          enum: *a3
        recipientId:
          type: string
          format: uuid
        serviceId:
          type: string
          format: uuid
        serviceRecordId:
          type: string
          format: uuid
        dueDate:
          anyOf:
            - type: string
              format: date-time
            - type: string
              nullable: true
            - nullable: true
        paymentTerms:
          type: string
        subTotal:
          type: number
          minimum: 0
        totalAmount:
          type: number
          minimum: 0
        vatAmount:
          type: number
          minimum: 0
        vatRate:
          type: number
          minimum: 0
        shippingCost:
          type: number
          minimum: 0
        notes:
          type: string
        termsAndConditions:
          type: string
        currencyCode:
          type: string
        lineItems:
          type: array
          items:
            type: object
            properties:
              type:
                type: string
                enum: *a2
              description:
                type: string
                minLength: 1
              note:
                type: string
              quantity:
                type: number
                minimum: 0
                exclusiveMinimum: true
              unitPrice:
                type: number
                minimum: 0
              totalPrice:
                type: number
                minimum: 0
              itemOrder:
                type: number
              discount:
                type: number
                minimum: 0
              productId:
                type: string
                format: uuid
              solutionId:
                type: string
                format: uuid
              vatRate:
                type: number
                minimum: 0
              vatAmount:
                type: number
                minimum: 0
              payableByCustomer:
                type: boolean
              isMandatory:
                type: boolean
            required:
              - type
              - description
              - quantity
              - unitPrice
              - totalPrice
          minItems: 1
        estimateId:
          type: string
          format: uuid
        serviceRecordIds:
          type: array
          items:
            type: string
            format: uuid
      required:
        - recipientType
        - recipientId
        - dueDate
        - subTotal
        - totalAmount
        - lineItems
    UpdateTransactionInput:
      type: object
      properties:
        status:
          type: string
          enum: &a14
            - DRAFT
            - PENDING
            - APPROVED
            - REJECTED
            - COMPLETED
            - CANCELLED
            - OVERDUE
            - PAID
        dueDate:
          anyOf:
            - type: string
              format: date-time
            - type: string
              nullable: true
            - nullable: true
        notes:
          type: string
        termsAndConditions:
          type: string
        paidAmount:
          type: number
          minimum: 0
